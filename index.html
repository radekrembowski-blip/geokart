<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoKart 🏎️</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #080810;
  font-family: 'Nunito', sans-serif;
  color: #f0f0ff;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
  gap: 2rem;
}

h1 {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(3rem, 12vw, 5rem);
  background: linear-gradient(90deg, #ff6b35, #ffd700, #00ff88);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center;
  line-height: 1;
}

.sub {
  font-size: 1rem;
  color: rgba(255,255,255,0.45);
  text-align: center;
  max-width: 280px;
}

.cards {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  width: 100%;
  max-width: 360px;
}

a.card {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1.1rem 1.2rem;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  text-decoration: none;
  color: white;
  transition: all 0.2s;
}

a.card:hover, a.card:active {
  background: rgba(255,255,255,0.09);
  transform: translateX(4px);
}

.card-icon { font-size: 2.2rem; flex-shrink: 0; }
.card-title { font-family: 'Fredoka One', cursive; font-size: 1.1rem; }
.card-desc { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 2px; }

.card.highlight { border-color: rgba(0,255,136,0.3); }
.card.highlight .card-title { color: #00ff88; }
</style>
</head>
<body>

<style id="version-style">
#dev-version {
  position: fixed;
  top: 0; left: 0; right: 0;
  background: #ff2244;
  color: white;
  text-align: center;
  font-family: monospace;
  font-size: 1.1rem;
  font-weight: bold;
  padding: 6px;
  z-index: 99999;
  letter-spacing: 2px;
}
</style>
<div id="dev-version">🚧 GeoKart DEV v2.1 — STARTSIDA 🚧</div>


<h1>🏎️ GeoKart</h1>
<div class="sub">Ditt kvarter. Din bana. Din kart.</div>

<div class="cards">

  <a class="card highlight" href="geokart-builder.html">
    <div class="card-icon">📍</div>
    <div>
      <div class="card-title">Spela in bana</div>
      <div class="card-desc">Cykla din bana · Röstkommandon · Spara som JSON</div>
    </div>
  </a>

  <a class="card" href="geokart-lego.html">
    <div class="card-icon">🧱</div>
    <div>
      <div class="card-title">Bygg din kart</div>
      <div class="card-desc">Foto av Lego-kart · AI ställer frågor · 3D-kart</div>
    </div>
  </a>

  <a class="card" href="geokart.html">
    <div class="card-icon">🏁</div>
    <div>
      <div class="card-title">Kör!</div>
      <div class="card-desc">Välj bana · Välj kart · Race!</div>
    </div>
  </a>

</div>

<div style="font-size:0.7rem; color:rgba(255,255,255,0.2); text-align:center">
  Bygg bana → Bygg kart → Kör · <span style="color:rgba(255,255,255,0.15)">v2.0</span>
</div>

</body>
</html>
