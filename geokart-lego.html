<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GeoKart — Bygg din kart! 🧱</title>
<!-- VERSION 2.2 -->
<style>
#version-tag {
  position: fixed;
  bottom: 6px;
  right: 10px;
  font-size: 0.6rem;
  color: rgba(255,255,255,0.15);
  z-index: 9999;
  pointer-events: none;
}
</style>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;900&display=swap');

:root {
  --bg: #0e0a1a;
  --yellow: #ffd700;
  --orange: #ff6b00;
  --red: #ff2244;
  --green: #00e87a;
  --blue: #00cfff;
  --purple: #cc44ff;
  --white: #f5f0ff;
  --muted: rgba(245,240,255,0.45);
  --surface: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.1);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  font-family: 'Nunito', sans-serif;
  color: var(--white);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Animated starfield */
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(100,0,200,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(0,100,255,0.06) 0%, transparent 50%);
  pointer-events:none;
}

/* ── PHASES ── */
#phase-upload, #phase-chat, #phase-kart { display: none; flex-direction: column; flex: 1; overflow: hidden; }
#phase-upload.active, #phase-chat.active, #phase-kart.active { display: flex; }

/* ══════════════════════════════════
   PHASE 1 — UPLOAD
══════════════════════════════════ */
#phase-upload {
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
  gap: 1.5rem;
  text-align: center;
}

.upload-title {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(2rem, 8vw, 3.5rem);
  line-height: 1.1;
  background: linear-gradient(135deg, var(--yellow), var(--orange), var(--red));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.upload-sub {
  font-size: 1rem;
  color: var(--muted);
  max-width: 300px;
  line-height: 1.5;
}

.lego-emoji {
  font-size: 5rem;
  animation: float 3s ease-in-out infinite;
  display: block;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

#upload-zone {
  width: 100%;
  max-width: 360px;
  aspect-ratio: 4/3;
  border: 2.5px dashed rgba(255,215,0,0.3);
  border-radius: 20px;
  background: rgba(255,215,0,0.03);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

#upload-zone:hover, #upload-zone.drag-over {
  border-color: var(--yellow);
  background: rgba(255,215,0,0.08);
  transform: scale(1.01);
}

#upload-zone img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 18px;
}

#upload-zone .upload-hint {
  font-size: 0.9rem;
  color: var(--muted);
  pointer-events: none;
}

#file-input { display: none; }

.big-btn {
  width: 100%;
  max-width: 360px;
  height: 64px;
  border: none;
  border-radius: 18px;
  font-family: 'Fredoka One', cursive;
  font-size: 1.4rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
}

.big-btn:active { transform: scale(0.97); }

.btn-yellow {
  background: linear-gradient(135deg, var(--yellow), var(--orange));
  color: #1a0a00;
}
.btn-yellow:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}

/* ══════════════════════════════════
   PHASE 2 — CHAT
══════════════════════════════════ */
#phase-chat {
  flex-direction: column;
}

#chat-header {
  padding: 1rem 1.2rem 0.8rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-shrink: 0;
}

#chat-kart-thumb {
  width: 56px; height: 56px;
  border-radius: 10px;
  object-fit: cover;
  border: 2px solid var(--yellow);
  flex-shrink: 0;
}

#chat-header-text { flex: 1; }
#chat-header-title {
  font-family: 'Fredoka One', cursive;
  font-size: 1.1rem;
  color: var(--yellow);
}
#chat-header-sub { font-size: 0.75rem; color: var(--muted); }

#chat-progress {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.progress-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
  transition: all 0.3s;
}
.progress-dot.done { background: var(--green); box-shadow: 0 0 6px var(--green); }
.progress-dot.active { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

#chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  scroll-behavior: smooth;
}
#chat-messages::-webkit-scrollbar { width: 4px; }
#chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg {
  display: flex;
  gap: 0.6rem;
  animation: msgIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  max-width: 85%;
}
@keyframes msgIn {
  from { opacity:0; transform: translateY(10px) scale(0.95); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

.msg.ai { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; flex-shrink: 0; margin-top: 2px;
}

.msg-bubble {
  padding: 0.65rem 0.9rem;
  border-radius: 16px;
  font-size: 0.95rem;
  line-height: 1.45;
}

.msg.ai .msg-bubble {
  background: rgba(100,50,255,0.15);
  border: 1px solid rgba(100,50,255,0.25);
  border-bottom-left-radius: 4px;
}

.msg.user .msg-bubble {
  background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,107,0,0.15));
  border: 1px solid rgba(255,215,0,0.25);
  border-bottom-right-radius: 4px;
  color: var(--yellow);
  font-weight: 700;
}

.typing-indicator {
  display: flex;
  gap: 5px;
  padding: 0.65rem 0.9rem;
  background: rgba(100,50,255,0.15);
  border: 1px solid rgba(100,50,255,0.25);
  border-radius: 16px;
  border-bottom-left-radius: 4px;
}
.typing-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--purple);
  animation: typingBounce 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

#quick-replies {
  padding: 0.5rem 1rem;
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  flex-shrink: 0;
}

.chip {
  padding: 0.4rem 0.8rem;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--white);
  cursor: pointer;
  transition: all 0.2s;
  animation: chipIn 0.3s ease-out;
}
@keyframes chipIn { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
.chip:hover { background: rgba(255,215,0,0.15); border-color: rgba(255,215,0,0.4); color: var(--yellow); }

#chat-input-row {
  display: flex;
  gap: 0.5rem;
  padding: 0.75rem 1rem 1.2rem;
  flex-shrink: 0;
  border-top: 1px solid var(--border);
}

#chat-input {
  flex: 1;
  height: 48px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 0 1rem;
  color: var(--white);
  font-family: 'Nunito', sans-serif;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s;
}
#chat-input:focus { border-color: rgba(255,215,0,0.4); }
#chat-input::placeholder { color: var(--muted); }

#send-btn {
  width: 48px; height: 48px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--yellow), var(--orange));
  color: #1a0a00;
  font-size: 1.2rem;
  cursor: pointer;
  transition: transform 0.2s;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
#send-btn:active { transform: scale(0.9); }

/* ══════════════════════════════════
   PHASE 3 — KART REVEAL
══════════════════════════════════ */
#phase-kart {
  flex-direction: column;
  overflow: hidden;
}

#kart-header {
  padding: 1rem 1.2rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  text-align: center;
}

#kart-header h2 {
  font-family: 'Fredoka One', cursive;
  font-size: 1.6rem;
  background: linear-gradient(90deg, var(--yellow), var(--orange));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

#kart-canvas-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}

#kartCanvas { width: 100%; height: 100%; display: block; }

#kart-stats {
  position: absolute;
  top: 0.8rem; left: 0.8rem;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

.stat-chip {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  background: rgba(0,0,0,0.7);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 0.75rem;
  font-weight: 700;
  backdrop-filter: blur(8px);
}

.stat-bar {
  width: 50px; height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  overflow: hidden;
}
.stat-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 1s ease-out;
}

#kart-bottom {
  padding: 0.8rem 1rem 1.2rem;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 0.5rem;
  flex-shrink: 0;
}

.kart-btn {
  flex: 1;
  height: 52px;
  border: none;
  border-radius: 14px;
  font-family: 'Fredoka One', cursive;
  font-size: 1rem;
  cursor: pointer;
  transition: transform 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 0.4rem;
}
.kart-btn:active { transform: scale(0.96); }
.kart-btn.primary { background: linear-gradient(135deg, var(--green), #00aa55); color: #001a0a; }
.kart-btn.secondary { background: var(--surface); border: 1px solid var(--border); color: var(--white); }
</style>
</head>
<body>

<style id="version-style">
#dev-version {
  position: fixed;
  top: 0; left: 0; right: 0;
  background: #ff2244;
  color: white;
  text-align: center;
  font-family: monospace;
  font-size: 1.1rem;
  font-weight: bold;
  padding: 6px;
  z-index: 99999;
  letter-spacing: 2px;
}
</style>
<div id="dev-version">🚧 GeoKart DEV v2.2 — LEGO-KART 🚧</div>


<!-- ══ PHASE 1: UPLOAD ══ -->
<div id="version-tag">v2.2</div>

<div id="phase-upload" class="active">
  <span class="lego-emoji">🧱</span>
  <div class="upload-title">Bygg din kart<br>i Lego!</div>
  <div class="upload-sub">Bygg din drömkart, ta ett foto och AI hjälper dig sätta ihop den i spelet!</div>

  <div id="upload-zone" onclick="document.getElementById('file-input').click()">
    <div style="font-size:2.5rem">📸</div>
    <div class="upload-hint">Tryck för att ta foto</div>
    <div class="upload-hint" style="font-size:0.75rem; opacity:0.6">eller välj från galleriet</div>
  </div>
  <input type="file" id="file-input" accept="image/*" onchange="handleImage(this)">

  <button class="big-btn btn-yellow" id="analyze-btn" onclick="startAnalysis()">
    🔍 Analysera min kart!
  </button>
</div>

<!-- ══ PHASE 2: CHAT ══ -->
<div id="phase-chat">
  <div id="chat-header">
    <img id="chat-kart-thumb" src="" alt="kart">
    <div id="chat-header-text">
      <div id="chat-header-title">🤖 Kart-AI pratar med dig</div>
      <div id="chat-header-sub">Svara på frågorna om din kart!</div>
    </div>
    <div id="chat-progress">
      <div class="progress-dot active" id="dot-0"></div>
      <div class="progress-dot" id="dot-1"></div>
      <div class="progress-dot" id="dot-2"></div>
      <div class="progress-dot" id="dot-3"></div>
      <div class="progress-dot" id="dot-4"></div>
    </div>
  </div>

  <div id="chat-messages"></div>
  <div id="quick-replies"></div>

  <div id="chat-input-row">
    <input id="chat-input" type="text" placeholder="Skriv ditt svar..." 
           onkeydown="if(event.key==='Enter')sendMessage()">
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- ══ PHASE 3: KART REVEAL ══ -->
<div id="phase-kart">
  <div id="kart-header">
    <h2 id="kart-name">⚡ Åskvingen 3000</h2>
    <div style="font-size:0.8rem; color:var(--muted)" id="kart-desc">Din personliga kart!</div>
  </div>
  <div id="kart-canvas-wrap">
    <canvas id="kartCanvas"></canvas>
    <div id="kart-stats"></div>
  </div>
  <div id="kart-bottom">
    <button class="kart-btn secondary" onclick="goBack()">✏️ Ändra</button>
    <button class="kart-btn primary" onclick="useKart()">🏎️ Kör med denna!</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
// 🔑 SÄTT IN DIN NYCKEL HÄR (RAD 305)
// ═══════════════════════════════════════════════════════
const GEMINI_API_KEY = "AIzaSyC6O_Q3306SJB9_1uy2a5UsRukrDjxa8AU";

async function callGemini(systemPrompt, userText, imageBase64 = null) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`;
  
  const payload = {
    system_instruction: { parts: [{ text: systemPrompt }] },
    contents: [{ role: 'user', parts: [] }]
  };
  
  if (imageBase64) {
    payload.contents[0].parts.push({ inline_data: { mime_type: "image/jpeg", data: imageBase64 } });
  }
  payload.contents[0].parts.push({ text: userText });

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if (data.error) console.error("API Fel:", data.error);
  return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let uploadedImageBase64 = null;
let conversationHistory = [];
let kartData = {
  name: 'Min Kart',
  color: '#ff6b00',
  bodyShape: 'normal',
  features: [],
  stats: { speed: 5, turbo: 5, defense: 5, handling: 5 },
  description: ''
};
let questionIndex = 0;
const TOTAL_QUESTIONS = 5;

// ═══════════════════════════════════════════════════════
// PHASE 1: IMAGE UPLOAD
// ═══════════════════════════════════════════════════════
function handleImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    uploadedImageBase64 = dataUrl.split(',')[1];
    const zone = document.getElementById('upload-zone');
    zone.innerHTML = `<img src="${dataUrl}" alt="din kart">`;
    document.getElementById('analyze-btn').disabled = false;
  };
  reader.readAsDataURL(file);
}

async function startAnalysis() {
  const imgSrc = document.querySelector('#upload-zone img')?.src;
  if (imgSrc) document.getElementById('chat-kart-thumb').src = imgSrc;
  document.getElementById('phase-upload').classList.remove('active');
  document.getElementById('phase-chat').classList.add('active');
  await askFirstQuestion();
}

// ═══════════════════════════════════════════════════════
// PHASE 2: AI CHAT
// ═══════════════════════════════════════════════════════
function addMessage(role, text, chips = []) {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = role === 'ai' ? `<div class="msg-avatar">🤖</div><div class="msg-bubble">${text}</div>` : `<div class="msg-bubble">${text}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  const qr = document.getElementById('quick-replies');
  qr.innerHTML = '';
  chips.forEach(chip => {
    const btn = document.createElement('button');
    btn.className = 'chip'; btn.textContent = chip;
    btn.onclick = () => { document.getElementById('chat-input').value = chip; sendMessage(); };
    qr.appendChild(btn);
  });
}

function showTyping() {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg ai'; div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">🤖</div><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

async function askFirstQuestion() {
  showTyping();
  try {
    const systemPrompt = `Du är en rolig AI-assistent för ett Mario Kart-spel för barn. Titta på denna Lego-kart. Ställ EN rolig, ledande fråga. Svara BARA i JSON: {"question":"Fråga","chips":["Svar1","Svar2"],"feature_detected":"boost|none"}`;
    const raw = await callGemini(systemPrompt, 'Titta på min Lego-kart! Vad ser du?', uploadedImageBase64);
    const result = JSON.parse(raw.replace(/```json|```/g, ''));
    document.getElementById('typing').remove();
    addMessage('ai', result.question, result.chips || []);
  } catch(e) { console.error(e); }
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  addMessage('user', text);
  input.value = '';
  
  // Här skulle du lägga till din ursprungliga logik för fortsatta frågor
}

function goBack() { location.reload(); }
function useKart() { alert("Kart sparad!"); }
</script>
</body>
</html>
