<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GeoKart Builder 🏗️</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Syne:wght@400;700;800&display=swap');

:root {
  --bg: #080810;
  --surface: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.1);
  --accent: #ff5c1a;
  --gold: #ffd700;
  --green: #00ff88;
  --blue: #00cfff;
  --lava: #ff3300;
  --text: #f0f0ff;
  --muted: rgba(240,240,255,0.45);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  font-family: 'Syne', sans-serif;
  color: var(--text);
  height: 100dvh;
  max-height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: fixed;
  inset: 0;
}

/* ── GRAIN OVERLAY ── */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none; z-index:1000; opacity:0.6;
}

/* ── HEADER ── */
header {
  padding: 1.2rem 1.5rem 0.8rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.logo {
  font-family: 'Fredoka One', cursive;
  font-size: 1.6rem;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.phase-badge {
  font-size: 0.7rem;
  font-weight: 800;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 20px;
}

/* ── MAIN LAYOUT ── */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 0;
  overflow: hidden;
  position: relative;
}

/* ── MAP / TRACK CANVAS ── */
#map-section {
  position: relative;
  height: 32vmin;
  min-height: 140px;
  max-height: 220px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: #05050f;
  overflow: hidden;
}

#trackCanvas {
  width: 100%;
  height: 100%;
  display: block;
}

.map-overlay-top {
  position: absolute;
  top: 0.8rem; left: 0.8rem; right: 0.8rem;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  pointer-events: none;
}

.gps-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(0,0,0,0.7);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 0.75rem;
  font-weight: 700;
  backdrop-filter: blur(8px);
}

.gps-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: blink 1.2s ease-in-out infinite;
}

.gps-dot.inactive { background: var(--muted); box-shadow: none; animation: none; }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.point-counter {
  font-size: 0.75rem;
  color: var(--muted);
  background: rgba(0,0,0,0.7);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
  backdrop-filter: blur(8px);
}

/* ── OBSTACLE LIST ── */
#obstacle-log {
  flex: 1;
  overflow-y: auto;
  padding: 0.8rem 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

#obstacle-log::-webkit-scrollbar { width: 4px; }
#obstacle-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.log-header {
  font-size: 0.65rem;
  font-weight: 800;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  padding-bottom: 0.3rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.obstacle-item {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.6rem 0.8rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  animation: slideIn 0.3s ease-out;
  flex-shrink: 0;
}

@keyframes slideIn {
  from { opacity:0; transform: translateX(-12px); }
  to   { opacity:1; transform: translateX(0); }
}

.obs-icon { font-size: 1.5rem; flex-shrink: 0; }

.obs-info { flex: 1; min-width: 0; }
.obs-name { font-size: 0.9rem; font-weight: 700; }
.obs-coords { font-size: 0.7rem; color: var(--muted); font-family: monospace; }

.obs-type-badge {
  font-size: 0.6rem;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 7px;
  border-radius: 6px;
  flex-shrink: 0;
}

.badge-lava   { background: rgba(255,51,0,0.2);   color: #ff6644; border: 1px solid rgba(255,51,0,0.4); }
.badge-portal { background: rgba(0,207,255,0.2);  color: #00cfff; border: 1px solid rgba(0,207,255,0.4); }
.badge-spike  { background: rgba(255,92,26,0.2);  color: #ff8855; border: 1px solid rgba(255,92,26,0.4); }
.badge-boost  { background: rgba(255,215,0,0.2);  color: #ffd700; border: 1px solid rgba(255,215,0,0.4); }
.badge-jump   { background: rgba(0,255,136,0.2);  color: #00ff88; border: 1px solid rgba(0,255,136,0.4); }

/* ── BOTTOM CONTROLS ── */
#controls {
  padding: 0.6rem 1rem max(0.8rem, env(safe-area-inset-bottom));
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  flex-shrink: 0;
  background: rgba(5,5,15,0.97);
  backdrop-filter: blur(20px);
}

/* ── MIC BUTTON ── */
#mic-btn {
  width: 100%;
  height: 60px;
  border: none;
  border-radius: 16px;
  font-family: 'Fredoka One', cursive;
  font-size: 1.2rem;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.15s, box-shadow 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
  background: linear-gradient(135deg, #1a0a00, #2a1500);
  border: 1.5px solid rgba(255,92,26,0.3);
  color: var(--muted);
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
}

#mic-btn.listening {
  background: linear-gradient(135deg, var(--accent), #cc3300);
  border-color: transparent;
  color: white;
  box-shadow: 0 0 30px rgba(255,92,26,0.5), 0 0 60px rgba(255,92,26,0.2);
  animation: micPulse 1s ease-in-out infinite;
}

@keyframes micPulse {
  0%,100% { box-shadow: 0 0 30px rgba(255,92,26,0.5), 0 0 60px rgba(255,92,26,0.2); }
  50%      { box-shadow: 0 0 50px rgba(255,92,26,0.8), 0 0 90px rgba(255,92,26,0.4); }
}

#mic-btn:active { transform: scale(0.97); }

.mic-ring {
  position: absolute;
  inset: -4px;
  border-radius: 20px;
  border: 2px solid rgba(255,92,26,0.6);
  opacity: 0;
  animation: ringExpand 1.5s ease-out infinite;
}

#mic-btn.listening .mic-ring { opacity: 1; }
@keyframes ringExpand {
  0%   { transform: scale(1); opacity: 0.6; }
  100% { transform: scale(1.08); opacity: 0; }
}

/* ── TRANSCRIPT ── */
#transcript-box {
  min-height: 36px;
  padding: 0.5rem 0.8rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 0.85rem;
  color: var(--muted);
  font-style: italic;
  transition: all 0.3s;
  line-height: 1.4;
}

#transcript-box.active {
  border-color: rgba(255,92,26,0.4);
  color: var(--text);
  font-style: normal;
}

/* ── GPS CONTROLS ROW ── */
.ctrl-row {
  display: flex;
  gap: 0.5rem;
}

.ctrl-btn {
  flex: 1;
  height: 44px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  background: var(--surface);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  touch-action: manipulation;
  -webkit-user-select: none;
  user-select: none;
}

.ctrl-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }

.ctrl-btn.primary {
  background: linear-gradient(135deg, rgba(0,255,136,0.15), rgba(0,207,255,0.1));
  border-color: rgba(0,255,136,0.4);
  color: var(--green);
}

.ctrl-btn.danger {
  background: linear-gradient(135deg, rgba(255,92,26,0.15), rgba(255,0,0,0.1));
  border-color: rgba(255,92,26,0.4);
  color: var(--accent);
}

.ctrl-btn.export {
  background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,165,0,0.1));
  border-color: rgba(255,215,0,0.4);
  color: var(--gold);
}

/* ── AI STATUS ── */
#ai-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.75rem;
  color: var(--muted);
  padding: 0 0.2rem;
}

.ai-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
}
.ai-dot.thinking {
  background: var(--gold);
  box-shadow: 0 0 6px var(--gold);
  animation: blink 0.6s ease-in-out infinite;
}
.ai-dot.ready {
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
}

/* ── TOAST ── */
#toast {
  position: fixed;
  top: 1rem; left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: rgba(10,10,25,0.95);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 0.8rem 1.4rem;
  font-size: 0.9rem;
  font-weight: 700;
  backdrop-filter: blur(20px);
  z-index: 999;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
  max-width: 90vw;
  text-align: center;
}

#toast.show { transform: translateX(-50%) translateY(0); }

/* ── EMPTY STATE ── */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  color: var(--muted);
  font-size: 0.85rem;
  text-align: center;
  padding: 1rem;
}

.empty-icon { font-size: 2.5rem; opacity: 0.4; }

/* ── WAVEFORM ── */
.waveform {
  display: flex;
  align-items: center;
  gap: 3px;
  height: 24px;
}

.wave-bar {
  width: 3px;
  background: white;
  border-radius: 2px;
  animation: wave 0.8s ease-in-out infinite;
}

.wave-bar:nth-child(1) { animation-delay: 0s;    height: 40%; }
.wave-bar:nth-child(2) { animation-delay: 0.1s;  height: 70%; }
.wave-bar:nth-child(3) { animation-delay: 0.2s;  height: 100%; }
.wave-bar:nth-child(4) { animation-delay: 0.15s; height: 70%; }
.wave-bar:nth-child(5) { animation-delay: 0.05s; height: 40%; }

@keyframes wave {
  0%,100% { transform: scaleY(1); }
  50%      { transform: scaleY(0.3); }
}
</style>
</head>
<body>

<div id="dev-version" style="position: fixed; top: 0; left: 0; right: 0; background: #ff2244; color: white; text-align: center; font-family: monospace; font-size: 1.1rem; font-weight: bold; padding: 6px; z-index: 99999; letter-spacing: 2px;">🚧 GeoKart DEV v2.3 — BANBYGGARE 🚧</div>

<header>
  <div class="logo">🏗️ GeoKart Builder</div>
  <div class="phase-badge" id="phase-label">Redo</div>
</header>

<main>
  <div id="map-section">
    <canvas id="trackCanvas"></canvas>
    <div class="map-overlay-top">
      <div class="gps-pill">
        <div class="gps-dot inactive" id="gps-dot"></div>
        <span id="gps-label">GPS av</span>
      </div>
      <div class="point-counter" id="point-counter">0 punkter</div>
    </div>
  </div>
  <div id="obstacle-log">
    <div class="log-header">Placerade objekt</div>
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">🎙️</div>
      <div>Starta GPS och säg vad du vill ha längs banan</div>
      <div style="font-size:0.75rem;opacity:0.7">"Lägg en lavagrop här" · "Sätt en portal" · "Spikmattor!"</div>
    </div>
  </div>
</main>

<div id="controls">
  <div id="ai-status">
    <div class="ai-dot" id="ai-dot"></div>
    <span id="ai-status-text">AI redo — tryck mikrofonen och tala</span>
  </div>

  <div id="transcript-box">Ingenting ännu...</div>

  <button id="mic-btn">
    <div class="mic-ring"></div>
    <span id="mic-icon">🎤</span>
    <span id="mic-label">Tryck & tala</span>
  </button>

  <div class="ctrl-row">
    <button class="ctrl-btn primary" id="gps-btn">
      <span id="gps-btn-icon">📍</span>
      <span id="gps-btn-label">Starta GPS</span>
    </button>
    <button class="ctrl-btn danger" id="clear-btn">
      🗑️ Rensa
    </button>
    <button class="ctrl-btn export" id="export-btn">
      💾 Spara
    </button>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// 🔑 SÄTT IN DIN NYCKEL HÄR
// ═══════════════════════════════════════════════════════
async function callGemini(systemPrompt, userText, imageBase64 = null) {
  const parts = [];
  if (imageBase64) {
    parts.push({ inline_data: { mime_type: "image/jpeg", data: imageBase64 } });
  }
  parts.push({ text: userText });

  const res = await fetch('/api/gemini', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'gemini-2.5-flash',
      payload: {
        system_instruction: { parts: [{ text: systemPrompt }] },
        contents: [{ role: 'user', parts }],
      }
    })
  });
  const data = await res.json();
  if (data.error) console.error("API Fel:", data.error);
  return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';


// ═══════════════════════════════════════════════════════
// STATE & CANVAS
// ═══════════════════════════════════════════════════════
const state = {
  gpsActive: false,
  gpsPoints: [],
  obstacles: [],
  watchId: null,
  currentLat: null,
  currentLon: null,
};
const canvas = document.getElementById('trackCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  drawMap();
}
window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 100);

// ═══════════════════════════════════════════════════════
// DRAWING
// ═══════════════════════════════════════════════════════
function drawMap() {
  const W = canvas.width / devicePixelRatio;
  const H = canvas.height / devicePixelRatio;
  ctx.clearRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  for (let x = 0; x < W; x += 30) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 30) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  if (state.gpsPoints.length < 2) return;
  const pts = toCanvasCoords(state.gpsPoints, W, H);
  ctx.strokeStyle = '#1a2a4a'; ctx.lineWidth = 8;
  ctx.beginPath();
  pts.forEach((p,i) => i === 0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y));
  ctx.stroke();
}

function toCanvasCoords(gpsPoints, W, H) {
  const lats = gpsPoints.map(p => p.lat), lons = gpsPoints.map(p => p.lon);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const minLon = Math.min(...lons), maxLon = Math.max(...lons);
  const pad = 30;
  return gpsPoints.map(p => ({
    x: pad + (maxLon - minLon === 0 ? W/2 : (p.lon - minLon) / (maxLon - minLon) * (W - pad*2)),
    y: pad + (maxLat - minLat === 0 ? H/2 : (1 - (p.lat - minLat) / (maxLat - minLat)) * (H - pad*2))
  }));
}

// ═══════════════════════════════════════════════════════
// GPS & VOICE
// ═══════════════════════════════════════════════════════
function startGPS() {
  if (!('geolocation' in navigator)) return;
  state.gpsActive = true;
  document.getElementById('gps-dot').classList.remove('inactive');
  state.watchId = navigator.geolocation.watchPosition(pos => {
    state.currentLat = pos.coords.latitude;
    state.currentLon = pos.coords.longitude;
    state.gpsPoints.push({ lat: pos.coords.latitude, lon: pos.coords.longitude, ts: Date.now() });
    document.getElementById('point-counter').textContent = `${state.gpsPoints.length} punkter`;
    drawMap();
  }, () => { showToast('GPS-fel: Simulerar rörelse'); simulateGPS(); }, { enableHighAccuracy: true });
}

function stopGPS() {
  state.gpsActive = false;
  if (state.watchId) navigator.geolocation.clearWatch(state.watchId);
  document.getElementById('gps-dot').classList.add('inactive');
}

function simulateGPS() {
  const baseLat = 55.605, baseLon = 13.003;
  let i = 0;
  const interval = setInterval(() => {
    if (!state.gpsActive) { clearInterval(interval); return; }
    const lat = baseLat + Math.sin(i * 0.1) * 0.001;
    const lon = baseLon + Math.cos(i * 0.1) * 0.001;
    state.currentLat = lat; state.currentLon = lon;
    state.gpsPoints.push({ lat, lon, ts: Date.now() });
    document.getElementById('point-counter').textContent = `${state.gpsPoints.length} punkter`;
    drawMap();
    i++;
  }, 1000);
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = SR ? new SR() : null;
if (recognition) {
  recognition.lang = 'sv-SE';
  recognition.onresult = e => {
    const text = e.results[e.results.length-1][0].transcript;
    document.getElementById('transcript-box').textContent = `"${text}"`;
    processVoiceCommand(text);
  };
}

function toggleMic() {
  if (recognition) recognition.start();
}

async function processVoiceCommand(text) {
  setAIStatus('thinking', 'AI tolkar...');
  try {
    const raw = await callGemini(
      "Du är en AI för ett Mario Kart-spel. Användaren talar in vad de vill ha. Svara ENBART med JSON: {'type':'lava','icon':'🌋','name':'Lavagrop'}",
      text
    );
    const obs = JSON.parse(raw.replace(/```json|```/g, ''));
    placeObstacle(obs, text);
    setAIStatus('ready', `✅ Placerade "${obs.name}"!`);
  } catch(e) {
    console.error(e);
    setAIStatus('ready', 'Förstod inte, försök igen!');
  }
}

function placeObstacle(obs, voiceText) {
  state.obstacles.push({...obs, lat: state.currentLat, lon: state.currentLon, voiceText});
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();
  const log = document.getElementById('obstacle-log');
  const div = document.createElement('div');
  div.className = 'obstacle-item';
  div.innerHTML = `<div class="obs-icon">${obs.icon}</div><div class="obs-info"><div class="obs-name">${obs.name}</div></div>`;
  log.appendChild(div);
}

function setAIStatus(state, text) {
  document.getElementById('ai-dot').className = 'ai-dot ' + state;
  document.getElementById('ai-status-text').textContent = text;
}

let toastTimeout;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), 2800);
}

document.getElementById('gps-btn').onclick = () => state.gpsActive ? stopGPS() : startGPS();
document.getElementById('mic-btn').onclick = toggleMic;
document.getElementById('clear-btn').onclick = () => location.reload();
document.getElementById('export-btn').onclick = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `geokart-bana-${Date.now()}.json`;
    a.click();
};

resizeCanvas();
</script>
</body>
</html>
